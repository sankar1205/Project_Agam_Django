<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AGAM Chat - Patient</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; }
      #chat { border: 1px solid #ddd; padding: 1rem; height: 60vh; overflow:auto; }
      .human { color: #0b5; margin: 0.5rem 0; }
      .ai { color: #05f; margin: 0.5rem 0; }
      #controls { margin-top: 1rem; }
      pre { white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <h2>AGAM Chat</h2>
    <div id="meta"></div>
    <div id="chat"></div>
    <div id="controls">
      <input id="msg" placeholder="Type your message" size="60" />
      <button id="send">Send</button>
      <button id="clear">Clear Local View</button>
    </div>

    <script>
      // Determine patient id from the URL path: expected /api/v1/chat_page/{patient_id}
      function getPatientId(){
        const parts = location.pathname.split('/').filter(Boolean);
        // find the last segment
        const last = parts[parts.length-1];
        const id = Number(last);
        return Number.isFinite(id) ? id : null;
      }

      const patientId = getPatientId();
      const chatEl = document.getElementById('chat');
      const metaEl = document.getElementById('meta');

      async function loadState(){
        if(!patientId) return;
        const r = await fetch('/api/v1/patient/state/' + patientId);
        if(r.ok){
          const data = await r.json();
          metaEl.innerText = 'Therapist tone: ' + (data.therapist_tone || 'N/A') + '\nWorksheet: ' + (data.active_worksheet_context || 'N/A') + '\nPending check-in: ' + (data.pending_checkin || 'N/A');
        }
      }

      async function sendMessage(){
        if(!patientId) return alert('Missing patient id in URL');
        const input = document.getElementById('msg');
        const text = input.value.trim();
        if(!text) return;
        appendHuman(text);
        input.value = '';

        const resp = await fetch('/api/v1/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ patient_id: patientId, message: text })
        });
        if(resp.ok){
          const body = await resp.json();
          appendAI(body.response);
          loadState();
        } else {
          appendAI('Error from server');
        }
      }

      function appendHuman(text){
        const d = document.createElement('div'); d.className = 'human'; d.textContent = 'You: ' + text; chatEl.appendChild(d); chatEl.scrollTop = chatEl.scrollHeight;
      }
      function appendAI(text){
        const d = document.createElement('div'); d.className = 'ai'; d.textContent = 'AGAM: ' + text; chatEl.appendChild(d); chatEl.scrollTop = chatEl.scrollHeight;
      }

      document.getElementById('send').addEventListener('click', sendMessage);
      document.getElementById('msg').addEventListener('keydown', (e)=>{ if(e.key === 'Enter') sendMessage(); });
      document.getElementById('clear').addEventListener('click', ()=>{ chatEl.innerHTML = ''; });

      loadState();
    </script>
  </body>
</html>
